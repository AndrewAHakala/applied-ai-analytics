version: 2

# Staging models - clean, renamed source data

models:
  - name: stg_accounts
    description: "Staging model: Stg Accounts"
    config:
      tags: ['staging']
    columns:
      - name: account_id
        description: "Account Id"
        data_tests:
          - not_null
          - unique
      - name: account_name
        description: "Account Name"
      - name: industry_code
        description: "Industry Code"
      - name: account_status
        description: "Account Status"
      - name: business_segment
