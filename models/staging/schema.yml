version: 2

# Staging models - clean, renamed source data

models:
  - name: stg_accounts
    description: Account-level semantic model for insureds and policyholders.
    config:
      tags: ['staging']
    semantic_model:
      enabled: true
      name: accounts
    columns:
      - name: account_id
        description: Account entity key.
        data_tests:
          - not_null
          - unique
        entity:
          type: primary
          name: account
      - name: account_name
        description: Legal account name.
        dimension:
          type: categorical
      - name: industry_code
        description: Industry classification code.
        dimension:
          type: categorical
      - name: account_status
        description: Current account lifecycle status.
        dimension:
          type: categorical
      - name: business_segment
        description: Business segment for the account.
        dimension:
          type: categorical

  - name: stg_policies
    description: Policy-level semantic model for active and historical policies.
    config:
      tags: ['staging']
    semantic_model:
      enabled: true
      name: policies
    columns:
      - name: policy_id
        description: Policy entity key.
        data_tests:
          - not_null
          - unique
        entity:
          type: primary
          name: policy
      - name: account_id
        description: Parent account key.
        data_tests:
          - not_null
        entity:
          type: foreign
          name: account
      - name: policy_number
        description: Operational policy number.
        dimension:
          type: categorical
      - name: line_of_business
        description: Coverage line written on the policy.
        dimension:
          type: categorical
      - name: policy_status
        description: Current policy status.
        dimension:
          type: categorical


  - name: stg_policy_terms
    description: Policy-term semantic model for premium and policy-period analysis.
    config:
      tags: ['staging']
    semantic_model:
      enabled: true
      name: policy_terms
    agg_time_dimension: effective_date
    derived_semantics:
      dimensions:
        - name: premium_size_band
          type: categorical
          expr: "case when written_premium < 1000 then 'small' when written_premium < 10000 then 'mid' when written_premium < 50000 then 'large' else 'xlarge' end"
          label: Premium Size Band
    columns:
      - name: policy_term_id
        description: Policy term entity key.
        data_tests:
          - not_null
          - unique
        entity:
          type: primary
          name: policy_term
      - name: policy_id
        description: Parent policy key.
        data_tests:
          - not_null
        entity:
          type: foreign
          name: policy
      - name: effective_date
        description: Policy term effective date.
        data_tests:
          - not_null
        granularity: day
        dimension:
          type: time
      - name: written_premium
        description: Written premium for the policy term.
      - name: expiration_date
        description: Policy term expiration date.
        data_tests:
          - not_null
        granularity: day
        dimension:
          type: time
    metrics:
      - name: written_premium
        description: |
          Total premium written across in-force policy terms.
          Common slices: line_of_business, account_name, business_segment, industry_code, state, metric_time.
          Example questions: "written premium by line of business", "top 10 accounts by premium",
          "premium trend by quarter".
          Also known as: WP, gross written premium, GWP, premium dollars.
        type: simple
        label: Written Premium
        agg: sum
        expr: written_premium
      - name: policy_term_count
        description: |
          Count of policy terms (one row per policy x term).
          Common slices: line_of_business, business_segment, industry_code, policy_status.
          Example questions: "policy term count by line of business".
        type: simple
        label: Policy Term Count
        agg: count
        expr: 1
      - name: average_written_premium
        description: |
          Average written premium per policy term (total WP / policy term count).
          Common slices: line_of_business, business_segment, industry_code.
          Example questions: "average premium by line of business", "average premium per policy".
          Also known as: average WP, avg premium per policy.
        type: simple
        label: Average Written Premium
        agg: average
        expr: written_premium
      - name: large_policy_term_count
        description: |
          Count of policy terms classified as LARGE by premium size.
          Common slices: line_of_business, business_segment.
          Example questions: "how many large policies by line of business".
        type: simple
        label: Large Policy Term Count
        agg: count
        expr: 1
        filter: |
          {{ Dimension('policy_term__premium_size_band') }} in ('large', 'xlarge')

  - name: stg_claims
    description: Staging model for claims data.
    config:
      tags: ['staging']
    columns:
      - name: claim_id
        description: Claim entity key.
        data_tests:
          - not_null
          - unique
      - name: policy_id
        description: Parent policy key.
        data_tests:
          - not_null
      - name: claim_status
        description: Current claim lifecycle status.
      - name: cause_of_loss
        description: Primary cause of loss.
      - name: date_of_loss
        description: Date the loss occurred.
        data_tests:
          - not_null

  - name: stg_claim_financials
    description: Claim financial semantic model for severity and reserve analysis.
    config:
      tags: ['staging']
    semantic_model:
      enabled: true
      name: claim_financials
    derived_semantics:
      dimensions:
        - name: severity_band
          type: categorical
          expr: "case when incurred_loss < 10000 then 'low' when incurred_loss < 50000 then 'medium' when incurred_loss < 250000 then 'high' else 'catastrophic' end"
          label: Severity Band
    columns:
      - name: claim_financial_id
        description: Claim financial entity key.
        data_tests:
          - not_null
          - unique
        entity:
          type: primary
          name: claim_financial
      - name: claim_id
        description: Parent claim key.
        data_tests:
          - not_null
        entity:
          type: foreign
          name: claim
      - name: incurred_loss
        description: Total incurred loss amount.
      - name: paid_loss
        description: Total paid loss amount.
      - name: case_reserve
        description: Total case reserve amount.

  - name: stg_underwriting_submissions
    description: Submission semantic model for underwriting navigation and slicing.
    config:
      tags: ['staging']
    semantic_model:
      enabled: true
      name: underwriting_submissions
    columns:
      - name: submission_id
        description: Submission entity key.
        data_tests:
          - not_null
          - unique
        entity:
          type: primary
          name: submission
      - name: account_id
        description: Parent account key.
        data_tests:
          - not_null
        entity:
          type: foreign
          name: account
      - name: submission_type
        description: Submission type such as new or renewal.
        dimension:
          type: categorical
      - name: underwriting_decision
        description: Final underwriting decision.
        dimension:
          type: categorical
      - name: distribution_channel
        description: Distribution channel.
        dimension:
          type: categorical

  - name: stg_expenses
    description: Expense semantic model for expense and combined-ratio style analysis.
    config:
      tags: ['staging']
    semantic_model:
      enabled: true
      name: expenses
    agg_time_dimension: expense_date
    columns:
      - name: expense_id
        description: Expense entity key.
        data_tests:
          - not_null
          - unique
        entity:
          type: primary
          name: expense
      - name: policy_term_id
        description: Parent policy term key.
        data_tests:
          - not_null
        entity:
          type: foreign
          name: policy_term
      - name: expense_type
        description: Expense category.
        dimension:
          type: categorical
      - name: expense_amount
        description: Expense amount.
      - name: expense_date
        description: Expense booking date.
        data_tests:
          - not_null
        granularity: day
        dimension:
          type: time
    metrics:
      - name: expense_amount
        description: |
          Total expense amount.
          Common slices: expense_type, line_of_business (via policy_term__policy__line_of_business), metric_time.
          Example questions: "expenses by type", "expense trend by quarter".
        type: simple
        label: Expense Amount
        agg: sum
        expr: expense_amount
      - name: expense_count
        description: |
          Count of expense records.
          Common slices: expense_type, line_of_business.
        type: simple
        label: Expense Count
        agg: count
        expr: 1
      - name: average_expense_amount
        description: |
          Average expense per expense record.
          Common slices: expense_type, line_of_business.
        type: simple
        label: Average Expense Amount
        agg: average
        expr: expense_amount

  - name: stg_reinsurance_treaties
    description: Reinsurance semantic model for treaty-level slicing and joins.
    config:
      tags: ['staging']
    semantic_model:
      enabled: true
      name: reinsurance_treaties
    columns:
      - name: treaty_id
        description: Treaty entity key.
        data_tests:
          - not_null
          - unique
        entity:
          type: primary
          name: treaty
      - name: policy_id
        description: Parent policy key.
        data_tests:
          - not_null
        entity:
          type: foreign
          name: policy
      - name: treaty_type
        description: Treaty arrangement type.
        dimension:
          type: categorical
      - name: ceded_premium
        description: Total premium ceded to reinsurers.
      - name: ceded_loss
        description: Total loss ceded to reinsurers.

