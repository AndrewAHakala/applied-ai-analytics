version: 2

# Marts models - final consumption layer including facts, dimensions, and reports

models:
  - name: dim_policy_terms
    description: "Marts model: Dim Policy Terms"
    config:
      tags: ['marts']
    columns:
      - name: expense_id
        description: "Expense Id"
        data_tests:
          - not_null
          - unique
      - name: policy_term_id
        description: "Policy Term Id"
      - name: expense_type
        description: "Expense Type"
      - name: expense_amount
        description: "Expense Amount"
      - name: expense_date
        description: "Expense Date"
      - name: policy_terms_validated_policy_id
        description: "Policy Terms Validated Policy Id"
      - name: policy_terms_validated_effective_date
        description: "Policy Terms Validated Effective Date"
      - name: policy_terms_validated_written_premium
        description: "Policy Terms Validated Written Premium"
      - name: policy_terms_validated_expiration_date
        description: "Policy Terms Validated Expiration Date"
  - name: agg_policies_weekly
    description: "Marts model: Agg Policies Weekly"
    config:
      tags: ['marts']
    columns:
      - name: account_id
        description: "Account Id"
        data_tests:
          - not_null
          - unique
  - name: dim_policies
    description: "Marts model: Dim Policies"
    config:
      tags: ['marts']
    columns:
      - name: treaty_id
        description: "Treaty Id"
      - name: record_count
        description: "Record Count"
      - name: total_ceded_premium
        description: "Total Ceded Premium"
      - name: avg_ceded_premium
        description: "Avg Ceded Premium"
      - name: total_ceded_loss
        description: "Total Ceded Loss"
      - name: avg_ceded_loss
        description: "Avg Ceded Loss"
  - name: rpt_accounts_daily
    description: "Marts model: Rpt Accounts Daily"
    config:
      tags: ['marts']
    columns:
      - name: account_id
        description: "Account Id"
        data_tests:
          - not_null
          - unique
  - name: fct_accounts
    description: "Marts model: Fct Accounts"
    config:
      tags: ['marts']
    columns:
      - name: account_id
        description: "Account Id"
        data_tests:
          - not_null
          - unique
  - name: fct_claims
    description: Claim fact model joining claim events to claim financial measures for time-based semantic analysis.
    config:
      tags: ['marts']
    semantic_model:
      enabled: true
      name: claims
    agg_time_dimension: date_of_loss
    derived_semantics:
      dimensions:
        - name: severity_band
          type: categorical
          expr: "case when incurred_loss < 10000 then 'low' when incurred_loss < 50000 then 'medium' when incurred_loss < 250000 then 'high' else 'catastrophic' end"
          label: Severity Band
    columns:
      - name: claim_id
        description: Claim entity key.
        entity:
          type: primary
          name: claim
      - name: policy_id
        description: Parent policy key.
        entity:
          type: foreign
          name: policy
      - name: claim_status
        description: Current claim lifecycle status.
        dimension:
          type: categorical
      - name: cause_of_loss
        description: Primary cause of loss.
        dimension:
          type: categorical
      - name: date_of_loss
        description: Date the loss occurred.
        granularity: day
        dimension:
          type: time
      - name: incurred_loss
        description: Incurred loss amount.
      - name: paid_loss
        description: Paid loss amount.
      - name: case_reserve
        description: Case reserve amount.
    metrics:
      - name: claim_count
        description: |
          Total count of claims.
          Common slices: line_of_business, cause_of_loss, claim_status, severity_band, account_name, metric_time.
          Example questions: "how many claims by line of business", "claim count for ACME",
          "claims by cause of loss".
          Also known as: number of claims, total claims.
        type: simple
        label: Claim Count
        agg: count
        expr: 1
      - name: open_claim_count
        description: |
          Count of claims with status OPEN.
          Common slices: line_of_business, cause_of_loss, severity_band.
          Example questions: "open claims by line of business", "open claim count by cause of loss".
        type: simple
        label: Open Claim Count
        agg: count
        expr: 1
        filter: |
          {{ Dimension('claim__claim_status') }} = 'Open'
      - name: closed_claim_count
        description: |
          Count of claims with status CLOSED.
          Common slices: line_of_business, cause_of_loss, business_segment.
          Example questions: "closed claims by cause of loss".
        type: simple
        label: Closed Claim Count
        agg: count
        expr: 1
        filter: |
          {{ Dimension('claim__claim_status') }} = 'Closed'
      - name: incurred_loss
        description: |
          Total incurred loss (paid loss + case reserve).
          Common slices: line_of_business, cause_of_loss, severity_band, account_name.
          Example questions: "incurred loss by cause of loss", "incurred losses for ACME".
          Also known as: total loss, gross incurred loss.
        type: simple
        label: Incurred Loss
        agg: sum
        expr: incurred_loss
      - name: paid_loss
        description: |
          Total paid loss (cash payments on claims).
          Common slices: line_of_business, cause_of_loss, severity_band, metric_time.
          Example questions: "paid loss trend", "paid losses by cause of loss".
          Also known as: cash loss, indemnity paid.
        type: simple
        label: Paid Loss
        agg: sum
        expr: paid_loss
      - name: case_reserve
        description: |
          Total case reserve dollars across open claims.
          Common slices: line_of_business, cause_of_loss, severity_band, metric_time.
          Example questions: "case reserve by line of business", "reserves by cause of loss".
          Also known as: open reserves, claim reserves.
        type: simple
        label: Case Reserve
        agg: sum
        expr: case_reserve
      - name: average_incurred_loss
        description: |
          Average incurred loss per claim (incurred / claim count).
          Common slices: line_of_business, cause_of_loss, severity_band.
          Example questions: "average incurred loss by line of business".
        type: simple
        label: Average Incurred Loss
        agg: average
        expr: incurred_loss
      - name: average_paid_loss
        description: |
          Average paid loss per closed claim.
          Common slices: line_of_business, cause_of_loss, severity_band.
          Example questions: "average paid loss by line of business".
          Also known as: average payout, mean paid loss.
        type: simple
        label: Average Paid Loss
        agg: average
        expr: paid_loss
      - name: large_loss_count
        description: |
          Count of claims classified as LARGE (high or catastrophic severity band).
          Common slices: line_of_business, cause_of_loss, business_segment.
          Example questions: "how many large losses by line of business".
        type: simple
        label: Large Loss Count
        agg: count
        expr: 1
        filter: |
          {{ Dimension('claim__severity_band') }} in ('high', 'catastrophic')




  - name: time_spine_daily
    description: Daily time spine for MetricFlow and semantic layer time-based joins.
    config:
      tags: ['marts']
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        description: Base day column for the semantic layer time spine.
        granularity: day

